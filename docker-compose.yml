services:
  mysql:
    image: mysql:8.0
    container_name: mcp-mysql-db
    restart: unless-stopped
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-devpassword}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-devdb}
      MYSQL_USER: ${MYSQL_USER:-dev}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-devpassword}
    volumes:
      - mysql_data:/var/lib/mysql

  postgres:
    image: postgres:15
    container_name: mcp-postgres-db
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DATABASE:-devdb}
      POSTGRES_USER: ${POSTGRES_USER:-dev}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devpassword}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: mcp-mssql-db
    restart: unless-stopped
    ports:
      - "${MSSQL_PORT:-1433}:1433"
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${MSSQL_PASSWORD:-DevPassword123!}
      MSSQL_PID: "Developer"
    volumes:
      - mssql_data:/var/opt/mssql

  sqlite:
    image: alpine:3.20
    container_name: mcp-sqlite-db
    restart: unless-stopped
    environment:
      SQLITE_DB_FILE: ${SQLITE_DB_FILE:-dev.db}
    volumes:
      - ./data:/data
      - ./data/schema.sql:/init.sql:ro
    command: >
      sh -c "
        apk add --no-cache sqlite >/dev/null 2>&1 &&
        if [ ! -f /data/$$SQLITE_DB_FILE ]; then
          sqlite3 /data/$$SQLITE_DB_FILE < /init.sql &&
          echo \"SQLite database initialized at /data/$$SQLITE_DB_FILE\";
        fi &&
        tail -f /dev/null
      "

volumes:
  mysql_data:
  postgres_data:
  mssql_data:
